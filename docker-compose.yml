services:
  # ─── Base de données ──────────────────────────────────────────────────────
  db:
    image: postgis/postgis:18-3.6
    container_name: selene_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: selene_db
      POSTGRES_USER: selene_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DB_MIGRATE_PASSWORD: ${DB_MIGRATE_PASSWORD}
      DB_READONLY_PASSWORD: ${DB_READONLY_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backend/database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - selene_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selene_app -d selene_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache / Pub-Sub ──────────────────────────────────────────────────────
  redis:
    image: redis:8.6.3-alpine
    container_name: selene_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - selene_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Stockage fichiers (dev → MinIO compatible S3) ────────────────────────
  minio:
    image: minio/minio:latest
    container_name: selene_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # API S3
      - "127.0.0.1:9001:9001"   # Console web
    networks:
      - selene_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Initialisation bucket MinIO (one-shot) ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: selene_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb --ignore-existing local/selene-dev;
      mc anonymous set none local/selene-dev;
      echo 'Bucket selene-dev prêt.';
      exit 0;
      "
    networks:
      - selene_net

  # ─── Routage / Isochrones (dev → OSRM) ────────────────────────────────────
  # Prérequis : lancer scripts/setup-osrm.sh une fois avant de démarrer
  osrm:
    image: osrm/osrm-backend:v5.27.1
    container_name: selene_osrm
    restart: unless-stopped
    command: osrm-routed --algorithm mld --max-table-size 10000 /data/map.osrm
    volumes:
      - ./osrm_data:/data:ro
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - selene_net
    profiles:
      - routing  # Démarrer avec: docker compose --profile routing up

  # ─── Backend NestJS ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: selene_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.local
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "0.0.0.0:3000:3000"   # API REST + WebSocket (0.0.0.0 → accès réseau local Android)
      - "127.0.0.1:9229:9229"   # Debug Node.js
    networks:
      - selene_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

# ─── Volumes persistants ──────────────────────────────────────────────────
volumes:
  postgres_data:
    name: selene_postgres_data
  minio_data:
    name: selene_minio_data
  backend_node_modules:
    name: selene_backend_node_modules

# ─── Réseau interne (services non accessibles hors localhost) ─────────────
networks:
  selene_net:
    name: selene_network
    driver: bridge
