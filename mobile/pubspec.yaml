name: selene
description: Application mobile de mise en relation sportive locale.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.44.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Réseau
  dio: ^5.4.0

  # Stockage sécurisé (tokens JWT)
  flutter_secure_storage: ^9.2.0

  # WebSocket (chat temps réel)
  socket_io_client: ^2.0.3

  # Cartes — MapLibre (gratuit, OpenStreetMap)
  maplibre_gl: ^0.26.0

  # Cartes — Mapbox (50K loads/mois gratuit)
  mapbox_maps_flutter: ^2.0.0

  # Géolocalisation
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # Notifications push
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # Uploads fichiers
  image_picker: ^1.1.0
  cached_network_image: ^3.3.0

  # Utilitaires
  intl: ^0.19.0
  uuid: ^4.4.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

  # Tests
  mockito: ^5.4.0
  network_image_mock: ^2.1.1

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts Inter à ajouter au Sprint UI (télécharger depuis fonts.google.com/specimen/Inter)
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
